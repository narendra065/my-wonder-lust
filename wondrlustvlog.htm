<head>

    <title>Blog</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

            padding: 20px;
        }

        nav {
            display: flex;

    <header>

    <nav>

    <div class="blog">
        <div class="post">
            <img src="images/paris.jpg">

        </div>

        <div class="post">
            <img src="images/bali.jpg">
            <h2>Exploring Bali</h2>

</html>
