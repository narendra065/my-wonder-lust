<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wonderlust Travel Blog</title>

<style>
body { margin:0; font-family:Arial; }

/* HEADER */
header {
  background:#222; color:white; padding:15px; text-align:center;
}
nav a {
  color:white; margin:10px; text-decoration:none;
}

/* HERO */
.hero {
  height:300px;
  background:url('images/hero.jpg') center/cover;
  display:flex; justify-content:center; align-items:center;
  color:white; font-size:28px;
}

/* SECTION */
.section {
  padding:30px; text-align:center;
}

/* FLEX */
.flex {
  display:flex; flex-wrap:wrap; justify-content:center;
}
.box {
  width:250px; margin:10px; padding:10px; border:1px solid #ccc;
}

/* CONTACT */
input, textarea {
  width:80%; padding:10px; margin:10px;
}

/* FOOTER */
footer {
  background:#222; color:white; text-align:center; padding:10px;
}

/* MOBILE */
@media(max-width:768px){
  .flex { flex-direction:column; align-items:center; }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>🌍 Wonderlust</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#blog">Blog</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero" id="home">
  Explore the World ✈️
</div>

<!-- ABOUT -->
<div class="section" id="about">
  <h2>About</h2>
  <p>We share travel experiences and guides.</p>
</div>

<!-- BLOG -->
<div class="section" id="blog">
  <h2>Blog</h2>
  <div class="flex">
    <div class="box">Bali Trip 🌴</div>
    <div class="box">Paris Tour 🗼</div>
  </div>
</div>

<!-- SERVICES -->
<div class="section" id="services">
  <h2>Services</h2>
  <div class="flex">
    <div class="box">Tour Packages</div>
    <div class="box">Hotel Booking</div>
  </div>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
  <h2>Contact</h2>
  <input type="text" placeholder="Name"><br>
  <input type="email" placeholder="Email"><br>
  <textarea placeholder="Message"></textarea><br>
  <button>Send</button>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Wonderlust</p>
</footer>

</body>
</html>
