<style>
body {
  margin: 0;
  font-family: Arial;
}

/* HEADER */
header {
  background: #333;
  color: white;
  padding: 15px;
  text-align: center;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
}

/* BANNER */
.banner {
  width: 100%;
  height: 250px;
  background: url('images/banner.jpg') no-repeat center;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 28px;
}

/* CONTAINER */
.container {
  width: 90%;
  max-width: 1100px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

/* SERVICES */
.services {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.card {
  flex: 1 1 250px;
  max-width: 300px;
  border: 1px solid #ddd;
  padding: 15px;
  border-radius: 10px;
}

/* IMAGE FIX */
img {
  max-width: 100%;
  height: auto;
}

/* FOOTER */
footer {
  background: #333;
  color: white;
  text-align: center;
  padding: 10px;
}

/* MOBILE FIX */
@media (max-width: 768px) {
  nav {
    display: flex;
    flex-direction: column;
  }

  .banner {
    height: 180px;
    font-size: 20px;
  }

  .card {
    width: 90%;
  }
}
</style>
