<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderlust Blog</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial;
        }

        /* HEADER */
        header {
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover no-repeat;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: center;
            background: #222;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            padding: 12px 15px;
            text-decoration: none;
        }

        /* CONTENT */
        .container {
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        /* FOOTER */
        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Wanderlust Diaries</h1>
        <p>Travel • Explore • Discover</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <h2>Popular Destinations</h2>

        <div class="cards">
            <div class="card">
                <img src="images/paris.jpg">
                <h3>Paris</h3>
            </div>

            <div class="card">
                <img src="images/bali.jpg">
                <h3>Bali</h3>
            </div>

            <div class="card">
                <img src="images/newyork.jpg">
                <h3>New York</h3>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Wanderlust Blog</p>
    </footer>

</body>

</html>
