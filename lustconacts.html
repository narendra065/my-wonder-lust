<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        header {
            background: black;
            color: white;
            text-align: center;
            padding: 20px;
        }

        form {
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: orange;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>Contact Me</h1>
    </header>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message"></textarea>
        <button type="submit">Send</button>
    </form>

</body>

</html>
